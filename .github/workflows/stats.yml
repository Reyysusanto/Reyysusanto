name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate GitHub Stats
        run: |
          curl "https://github-readme-stats.vercel.app/api?username=Reyysusanto&count_private=true&include_all_commits=true&theme=dracula&token=${{ secrets.GH_TOKEN }}" -o stats.svg

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add stats.svg
          git commit -m "update stats" || echo "No changes"
          git push
